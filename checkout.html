<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Step Checkout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{width:900px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.1)}
.header{padding:20px;background:burlywood;color:#fff;display:flex;justify-content:space-between;align-items:center}
.steps{display:flex;justify-content:space-between;padding:20px;background:#fafafa;border-bottom:1px solid #ddd}
.step{flex:1;text-align:center;position:relative;font-size:14px;color:#777}
.step::after{content:'';position:absolute;right:0;top:50%;width:100%;height:3px;background:#ddd;z-index:-1}
.step:last-child::after{display:none}
.step.active{color:#111;font-weight:bold}
.step.active::after{background:#ff9900}
.content{padding:30px;min-height:400px;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.section{display:none}
.section.active{display:block}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:6px}
.btns{display:flex;justify-content:space-between;margin-top:20px}
button{padding:10px 20px;border:none;border-radius:6px;cursor:pointer}
.next{background:#ff9900;color:#fff}
.back{background:#ddd}
.summary{background:#fafafa;padding:15px;border-radius:8px}
.cart-item{display:flex;justify-content:space-between;margin:8px 0}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h2>Checkout</h2>
</div>

<div class="steps">
<div class="step active">Cart</div>
<div class="step">Address</div>
<div class="step">Payment</div>
<div class="step">Review</div>
</div>

<div class="content">

<!-- STEP 1 -->
<div class="section active" id="step-1">
<h3>Cart Items</h3>
<div class="summary" id="cartBox"></div>
<div class="btns">
<button class="next" onclick="nextStep()">Continue</button>
</div>
</div>

<!-- STEP 2 -->
<div class="section" id="step-2">
<h3>Delivery Address</h3>
<input placeholder="Full Name">
<input placeholder="Phone">
<input placeholder="Address">
<div class="btns">
<button class="back" onclick="prevStep()">Back</button>
<button class="next" onclick="nextStep()">Continue</button>
</div>
</div>

<!-- STEP 3 -->
<div class="section" id="step-3">
<h3>Payment Method</h3>
<input placeholder="Card Number">
<input placeholder="MM/YY">
<input placeholder="CVV">
<div class="btns">
<button class="back" onclick="prevStep()">Back</button>
<button class="next" onclick="nextStep()">Continue</button>
</div>
</div>

<!-- STEP 4 -->
<div class="section" id="step-4">
<h3>Review Order</h3>
<div class="summary" id="reviewBox"></div>
<div class="btns">
<button class="back" onclick="prevStep()">Back</button>
<button class="next" onclick="placeOrder()">Place Order</button>
</div>
</div>

</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let currentStep = 1;

function renderCart() {
  const box = document.getElementById("cartBox");

  if (!box) return;

  box.innerHTML = cart.map(i =>
    `<div class='cart-item'>
      <span>${i.name} x ${i.quantity}</span>
      <span>$${(i.price * i.quantity).toFixed(2)}</span>
    </div>`
  ).join("");
}

function renderReview() {
  const box = document.getElementById("reviewBox");
  let total = 0;

  box.innerHTML = cart.map(i => {
    total += i.price * i.quantity;
    return `
      <div class='cart-item'>
        <span>${i.name}</span>
        <span>$${(i.price * i.quantity).toFixed(2)}</span>
      </div>
    `;
  }).join("");

  box.innerHTML += `<hr><b>Total: $${total.toFixed(2)}</b>`;
}

function showStep(step) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('step-' + step).classList.add('active');

  document.querySelectorAll('.step').forEach((s, i) => {
    s.classList.toggle('active', i < step);
  });

  if (step === 1) renderCart();
  if (step === 4) renderReview();
}

function nextStep() {
  if (currentStep < 4) {
    currentStep++;
    showStep(currentStep);
  }
}

function prevStep() {
  if (currentStep > 1) {
    currentStep--;
    showStep(currentStep);
  }
}

function placeOrder() {
  alert("Order Placed Successfully!");

  localStorage.removeItem("cart");

  window.location.href = "index.html";
}

renderCart();
</script>

</body>
</html>
